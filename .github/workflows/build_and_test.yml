name: Build and test

on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master
  workflow_dispatch:
    inputs:
      target:
        description: 'Target branch to run'
        required: true

jobs:
  tpcds1g:
    name: Benchmark TPC-DS 1G
    runs-on: ubuntu-20.04
    continue-on-error: true
    steps:
      - name: Checkout Spark repository
        uses: actions/checkout@v2
      - name: Checkout tpcds-kit repository
        uses: actions/checkout@v2
        with:
          repository: databricks/tpcds-kit
          path: ./tpcds-kit
      - name: Checkout park-sql-perf repository
        uses: actions/checkout@v2
        with:
          repository: wangyum/spark-sql-perf
          path: ./spark-sql-perf
      - name: Install Java 8
        uses: actions/setup-java@v1
        with:
          java-version: 8
      - name: Build tpcds-kit
        run: cd tpcds-kit/tools && make OS=LINUX
      - name: Gen Data
        run: cd spark-sql-perf && build/sbt "test:runMain com.databricks.spark.sql.GenTPCDSData `pwd`/../tpcds-kit/tools 1 `pwd`/tpcds1g parquet"
      - name: Run TPCDSQueryBenchmark
        run: |
          SPARK_GENERATE_BENCHMARK_FILES=1 build/sbt "sql/test:runMain org.apache.spark.sql.execution.benchmark.TPCDSQueryBenchmark --data-location `pwd`/tpcds1g --query-filter q3 --cbo"
      - name: Upload benchmark result to report
        if: always()
        uses: actions/upload-artifact@v2
        with:
          name: TPC-DS 1G benchmark result
          path: "sql/core/benchmarks/TPCDSQueryBenchmark-results.txt"
